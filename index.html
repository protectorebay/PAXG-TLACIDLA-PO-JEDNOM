<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PAXG Stable Overlay</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    font-family: Arial, Helvetica, sans-serif;
    overflow: hidden;
}

.container {
    position: absolute;
    top: 40px;
    left: 40px;
}

.panel {
    background: #000;

    border: 4px solid;
    border-image: linear-gradient(to right, #000000, #3a2a0a) 1;

    padding: 20px 40px;

    font-size: 70px;
    font-weight: 900;
    color: white;

    width: 900px;

    opacity: 0;
    transform: translateX(-120px);
    transition: all 1s ease;
}

.panel.show {
    opacity: 1;
    transform: translateX(0);
}

.panel.hide {
    opacity: 0;
    transform: translateX(200px);
    transition: all 3s cubic-bezier(0.22, 1, 0.36, 1);
}

.green { color: #40e100; }
.red { color: #ff0000; }
</style>
</head>

<body>

<div class="container">
    <div class="panel" id="panel">Loading...</div>
</div>

<script>
const panel = document.getElementById("panel");

const periods = [
    {h: 6, label: "6H Change"},
    {h: 12, label: "12H Change"},
    {h: 24, label: "24H Change"},
    {h: 48, label: "48H Change"},
    {h: 72, label: "72H Change"},
    {h: 168, label: "1W Change"},
    {h: 720, label: "1M Change"},
];

let dataCache = [];
let index = 0;

// --- SAFE FETCH ---
async function safeFetch(url) {
    try {
        const r = await fetch(url);
        if (!r.ok) return null;
        return await r.json();
    } catch {
        return null;
    }
}

// --- FETCH ---
async function getCurrentPrice() {
    const d = await safeFetch("https://api.binance.com/api/v3/ticker/price?symbol=PAXGUSDT");
    return d ? parseFloat(d.price) : null;
}

async function getPastPrice(h) {
    const now = Date.now();
    const past = now - h * 3600000;

    const d = await safeFetch(`https://api.binance.com/api/v3/klines?symbol=PAXGUSDT&interval=1h&startTime=${past}&limit=1`);
    return (d && d[0]) ? parseFloat(d[0][1]) : null;
}

// --- UPDATE (SAFE) ---
async function updateData() {
    const current = await getCurrentPrice();
    if (!current) return; // keep old data

    let newData = [];

    for (let p of periods) {
        const past = await getPastPrice(p.h);

        if (!past) continue;

        const change = ((current - past) / past) * 100;

        newData.push({
            label: p.label,
            value: change
        });
    }

    // update only if valid
    if (newData.length > 0) {
        dataCache = newData;
    }
}

// --- DISPLAY ---
function showItem(item) {
    if (!item) return;

    const val = item.value ?? 0;
    const positive = val >= 0;

    panel.innerHTML = `
        ${item.label}
        <span class="${positive ? "green" : "red"}">
            ${(positive ? "+" : "") + val.toFixed(2)}%
        </span>
    `;

    panel.classList.remove("hide");
    panel.classList.add("show");
}

// --- ROTATION ---
async function rotationLoop() {
    while (true) {

        if (dataCache.length === 0) {
            await sleep(2000);
            continue;
        }

        const item = dataCache[index % dataCache.length];

        showItem(item);

        await sleep(10000);

        panel.classList.remove("show");
        panel.classList.add("hide");

        await sleep(3000);

        index++;
    }
}

// --- DATA LOOP ---
async function dataLoop() {
    while (true) {
        await updateData();
        await sleep(120000);
    }
}

function sleep(ms) {
    return new Promise(r => setTimeout(r, ms));
}

dataLoop();
rotationLoop();
</script>

</body>
</html>
